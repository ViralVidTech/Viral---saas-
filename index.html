<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Viral Video Generator</title>
</head>
<body>

<h2>Viral Video Generator</h2>

<input id="niche" placeholder="Enter niche" />
<select id="lang">
  <option value="en">English</option>
  <option value="fr">French</option>
  <option value="es">Spanish</option>
</select>

<br><br>

<button onclick="generateContent()">Generate Script</button>
<button onclick="generateAudio()">Generate Audio</button>
<button onclick="createVideo()">Create Video</button>

<br><br>

<pre id="scriptBox"></pre>

<br>

<div id="videoResult"></div>

<script>

let generatedScript = "";
let videoUrls = [];
let audioUrl = "";

async function generateContent() {
  const niche = document.getElementById("niche").value;
  const lang = document.getElementById("lang").value;

  const res = await fetch("/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ niche: niche, langue: lang })
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  generatedScript = data.script;
  videoUrls = [
    data.video_url,
    data.video_url2,
    data.video_url3,
    data.video_url4
  ];

  document.getElementById("scriptBox").textContent = generatedScript;
}

async function generateAudio() {
  if (!generatedScript) {
    alert("Generate script first");
    return;
  }

  const res = await fetch("/generate-audio", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      text: generatedScript,
      languageCode: "en-US"
    })
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  audioUrl = data.audio_url;
  alert("Audio ready");
}

async function createVideo() {
  const resultBox = document.getElementById("videoResult");

  resultBox.innerHTML = "Sending video...";

  const parts = generatedScript.split("\n\n");

  const payload = {
    text1: parts[0] || "",
    text2: parts[1] || "",
    text3: parts[2] || "",
    text4: parts[3] || "",
    video_url: videoUrls[0] || "",
    video_url2: videoUrls[1] || "",
    video_url3: videoUrls[2] || "",
    video_url4: videoUrls[3] || "",
    audio_url: audioUrl || ""
  };

  const res = await fetch("/create-video", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (!data.success) {
    resultBox.innerHTML = "Error: " + (data.error || "unknown");
    return;
  }

  const renderId = data.render_id;

  resultBox.innerHTML = "Rendering video...";

  let tries = 0;

  const interval = setInterval(async () => {
    tries++;

    const statusRes = await fetch(`/render-status/${renderId}`);
    const statusData = await statusRes.json();

    if (statusData.status === "done") {
      clearInterval(interval);

      resultBox.innerHTML = `
        <p>Video ready</p>
        <a href="${statusData.url}" target="_blank" download>
          <button>Download Video</button>
        </a>
      `;
    }

    if (statusData.status === "failed") {
      clearInterval(interval);
      resultBox.innerHTML = "Video failed";
    }

    if (tries > 40) {
      clearInterval(interval);
      resultBox.innerHTML = "Still processing...";
    }

  }, 5000);
}

</script>

</body>
</html>
